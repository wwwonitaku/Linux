name: Video OCR Vietnamese - Stable Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget ffmpeg libtinfo6 libgl1 libglx-mesa0
        sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

    - name: Install Python and Stable OCR Libraries
      run: |
        python -m pip install --upgrade pip
        # Ép cài đặt các phiên bản cũ hơn nhưng cực kỳ ổn định cùng nhau
        pip install paddlepaddle==2.6.2 paddleocr==2.7.3 opencv-python-headless

    - name: Download Video
      run: |
        wget "https://vicdn.cc/tt/VTTD-VS-419.mp4" -O /tmp/video.mp4

    - name: Run OCR with PaddleOCR
      env:
        FLAGS_selected_gpus: ""
      shell: python
      run: |
        import os
        import cv2
        import logging
        from paddleocr import PaddleOCR

        # Tắt toàn bộ log dư thừa
        logging.getLogger("ppocr").setLevel(logging.ERROR)

        # Khởi tạo với các tham số an toàn nhất cho bản 2.7.3
        try:
            ocr = PaddleOCR(lang='vi', use_angle_cls=False, use_gpu=False, show_log=False)
        except:
            # Nếu vẫn lỗi tham số, dùng khởi tạo rỗng
            ocr = PaddleOCR(lang='vi')

        video_path = '/tmp/video.mp4'
        output_path = '/tmp/subtitles.srt'
        
        cap = cv2.VideoCapture(video_path)
        fps = cap.get(cv2.CAP_PROP_FPS)
        if fps <= 0: fps = 25
        
        width = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
        height = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))

        def format_time(seconds):
            hrs = int(seconds // 3600)
            mins = int((seconds % 3600) // 60)
            secs = int(seconds % 60)
            msecs = int((seconds - int(seconds)) * 1000)
            return f"{hrs:02}:{mins:02}:{secs:02},{msecs:03}"

        subs = []
        last_text = ""
        frame_interval = int(fps / 2) # Quét mỗi 0.5s
        
        print(f"Bắt đầu OCR: {width}x{height} - {fps} FPS")

        frame_count = 0
        while cap.isOpened():
            ret, frame = cap.read()
            if not ret: break
            
            if frame_count % frame_interval == 0:
                timestamp = frame_count / fps
                # Lấy 25% dưới màn hình
                roi = frame[int(height * 0.75):height, 0:width]
                
                # Chạy OCR
                result = ocr.ocr(roi, cls=False)
                
                if result and result[0]:
                    # Trích xuất văn bản và lọc độ tin cậy > 0.5
                    texts = [line[1][0] for line in result[0] if line[1][1] > 0.5]
                    current_text = " ".join(texts).strip()
                    
                    if current_text and current_text != last_text:
                        start_time = format_time(timestamp)
                        end_time = format_time(timestamp + 0.6) # Tăng nhẹ thời gian hiển thị
                        
                        entry = f"{len(subs) + 1}\n{start_time} --> {end_time}\n{current_text}\n"
                        subs.append(entry)
                        last_text = current_text
                        print(f"[{start_time}] {current_text}")
            
            frame_count += 1

        cap.release()
        with open(output_path, 'w', encoding='utf-8') as f:
            f.write("\n".join(subs))
        
        print(f"Xong! Đã lưu {len(subs)} dòng vào {output_path}")

    - name: Convert and Upload
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -y -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
        fi
