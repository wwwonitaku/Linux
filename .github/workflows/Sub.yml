name: Run VideOCR from Release and Output to Log

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y wget unzip p7zip-full

    - name: Download and extract VideOCR release for Linux (7z)
      run: |
        # Tải tệp VideOCR từ GitHub releases
        wget https://github.com/timminator/VideOCR/releases/download/v1.4.2/VideOCR-CPU-v1.4.2-Linux.7z -O /tmp/VideOCR.7z
        # Giải nén tệp .7z
        7z x /tmp/VideOCR.7z -o/tmp/VideOCR
        # Kiểm tra danh sách các tệp trong thư mục giải nén
        echo "Contents of /tmp/VideOCR:"
        ls -al /tmp/VideOCR

    - name: Run VideOCR on the video and output results to log
      run: |
        # Kiểm tra lại đường dẫn và in danh sách các tệp trong thư mục con
        echo "Checking contents of /tmp/VideOCR/VideOCR-CPU-v1.4.2-Linux"
        ls /tmp/VideOCR/VideOCR-CPU-v1.4.2-Linux
        # Chạy VideOCR và in từng dòng kết quả vào log
        /tmp/VideOCR/VideOCR-CPU-v1.4.2-Linux/VideOCR --video https://vicdn.cc/tt/VTTD-VS-419.mp4 --output - | while IFS= read -r line; do
          echo "$line"
        done

    - name: Done
      run: |
        echo "OCR processing complete. Check the logs for the extracted subtitles."
