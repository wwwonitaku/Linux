name: Video OCR Vietnamese - The Final Solution

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget ffmpeg libtinfo6 libgl1 libglx-mesa0
        sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

    - name: Install Python and Fix Dependency Hell
      run: |
        python -m pip install --upgrade pip
        # 1. Gỡ cài đặt tất cả các phiên bản numpy hiện có để xóa sạch ABI 0x2000000
        pip uninstall -y numpy
        # 2. Cài đặt cứng bản 1.26.4 (bản ổn định cuối cùng của dòng 1.x)
        pip install "numpy<2.0.0"
        # 3. Cài đặt các thư viện OCR và ép chúng không được cập nhật numpy
        pip install paddlepaddle==2.6.2 paddleocr==2.7.3 opencv-python-headless --no-deps
        # 4. Cài đặt bổ sung các phụ thuộc thiếu do dùng --no-deps (nhưng vẫn giữ numpy cũ)
        pip install shapely pyclipper imgaug scikit-image layoutparser

    - name: Download Video
      run: |
        wget "https://vicdn.cc/tt/VTTD-VS-419.mp4" -O /tmp/video.mp4

    - name: Run OCR with PaddleOCR
      env:
        FLAGS_selected_gpus: ""
        PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      shell: python
      run: |
        import os
        import cv2
        import logging
        import numpy as np
        from paddleocr import PaddleOCR

        # Kiểm tra phiên bản để chắc chắn không phải 2.0.0
        print(f"--- Nnumpy version in use: {np.__version__} ---")

        logging.getLogger("ppocr").setLevel(logging.ERROR)

        # Khởi tạo tối giản cho bản 2.7.3
        ocr = PaddleOCR(lang='vi', use_angle_cls=False, use_gpu=False, show_log=False)

        video_path = '/tmp/video.mp4'
        output_path = '/tmp/subtitles.srt'
        
        cap = cv2.VideoCapture(video_path)
        fps = cap.get(cv2.CAP_PROP_FPS) or 25
        width = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
        height = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))

        def format_time(seconds):
            hrs = int(seconds // 3600)
            mins = int((seconds % 3600) // 60)
            secs = int(seconds % 60)
            msecs = int((seconds - int(seconds)) * 1000)
            return f"{hrs:02}:{mins:02}:{secs:02},{msecs:03}"

        subs = []
        last_text = ""
        frame_interval = int(fps / 2)
        
        print(f"Processing: {width}x{height}")

        frame_count = 0
        while cap.isOpened():
            ret, frame = cap.read()
            if not ret: break
            
            if frame_count % frame_interval == 0:
                timestamp = frame_count / fps
                # Quét 20% vùng dưới (vùng phụ đề)
                roi = frame[int(height * 0.8):height, 0:width]
                
                result = ocr.ocr(roi, cls=False)
                
                if result and result[0]:
                    current_text = " ".join([line[1][0] for line in result[0] if line[1][1] > 0.5]).strip()
                    
                    if current_text and current_text != last_text:
                        start_t = format_time(timestamp)
                        end_t = format_time(timestamp + 0.6)
                        subs.append(f"{len(subs) + 1}\n{start_t} --> {end_t}\n{current_text}\n")
                        last_text = current_text
                        print(f"[{start_t}] {current_text}")
            
            frame_count += 1

        cap.release()
        with open(output_path, 'w', encoding='utf-8') as f:
            f.write("\n".join(subs))

    - name: Convert and Upload
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -y -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
        fi
