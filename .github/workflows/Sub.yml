name: Video OCR Vietnamese - Self-Healing Edition

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Pre-install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget ffmpeg libtinfo6 libgl1 libglx-mesa0
        sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

    - name: Primary OCR Attempt
      id: primary_run
      continue-on-error: true # Nếu lỗi bước này, workflow vẫn không dừng lại
      run: |
        python -m pip install --upgrade pip
        pip install paddlepaddle==2.6.2 paddleocr==2.7.3 opencv-python-headless
        pip uninstall -y numpy && pip install "numpy<2.0.0"
        
        # Chạy file python chính (tôi sẽ viết script này trực tiếp bên dưới)
        python run_ocr.py

    - name: Self-Healing & Secondary Attempt
      if: steps.primary_run.outcome == 'failure' # Chỉ chạy nếu bước trên bị lỗi
      run: |
        echo "Phát hiện lỗi ở lần chạy đầu. Đang phân tích và sửa lỗi..."
        # Cài đặt toàn bộ các thư viện 'cứng đầu' thường gây lỗi thiếu module
        pip install decorator httpx pillow tqdm visualdl lmdb shapely pyclipper imgaug scikit-image layoutparser
        
        # Ép lại NumPy 1.x một lần nữa cho chắc chắn
        pip uninstall -y numpy && pip install "numpy<2.0.0"
        
        echo "Đang thử lại lần cuối..."
        python run_ocr.py

    - name: Final Check & Upload
      if: always() # Luôn kiểm tra xem file sub có tồn tại không để upload
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -y -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
          echo "Upload thành công!"
        else
          echo "Không tìm thấy file sub. Quá trình xử lý thất bại sau 2 lần thử."
          exit 1
        fi

    # Để script gọn hơn, chúng ta tạo file python ngay trong workflow
    - name: Create OCR Script
      run: |
        cat << 'EOF' > run_ocr.py
        import os, cv2, logging
        import numpy as np
        from paddleocr import PaddleOCR

        logging.getLogger("ppocr").setLevel(logging.ERROR)
        try:
            ocr = PaddleOCR(lang='vi', use_angle_cls=False, use_gpu=False, show_log=False)
        except:
            ocr = PaddleOCR(lang='vi')

        cap = cv2.VideoCapture('/tmp/video.mp4')
        fps = cap.get(cv2.CAP_PROP_FPS) or 25
        h = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))
        w = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
        
        subs = []
        last_text = ""
        frame_count = 0
        
        while cap.isOpened():
            ret, frame = cap.read()
            if not ret: break
            if frame_count % int(fps/2) == 0:
                roi = frame[int(h*0.8):h, 0:w]
                result = ocr.ocr(roi, cls=False)
                if result and result[0]:
                    text = " ".join([l[1][0] for l in result[0] if l[1][1] > 0.5]).strip()
                    if text and text != last_text:
                        ts = frame_count/fps
                        t_str = f"{int(ts//3600):02}:{int((ts%3600)//60):02}:{int(ts%60):02},{int((ts%1)*1000):03}"
                        subs.append(f"{len(subs)+1}\n{t_str} --> {t_str}\n{text}\n")
                        last_text = text
            frame_count += 1
        cap.release()
        with open('/tmp/subtitles.srt', 'w', encoding='utf-8') as f:
            f.write("\n".join(subs))
        EOF
