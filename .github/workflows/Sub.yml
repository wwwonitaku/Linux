name: Run VideOCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v3
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check for AVX support
      run: |
        if grep -q avx /proc/cpuinfo; then
          echo "AVX is supported!"
        else
          echo "AVX is NOT supported."
        fi

    - name: Download video
      run: |
        wget https://vicdn.cc/tt/VTTD-VS-419.mp4 -O /tmp/video.mp4

    - name: Run VideOCR on the video
      run: |
        # Chạy VideOCR và in kết quả trực tiếp lên log
        python tools/infer.py --video /tmp/video.mp4 | tee /tmp/ocr_output.log | while IFS= read -r line; do
          echo "$line"
        done
        # Lưu log tạm thời nếu cần (bước này có thể bỏ qua)
        # cat /tmp/ocr_output.log

    - name: Display OCR output
      run: |
        echo "Completed OCR processing. Check the logs above for details."
