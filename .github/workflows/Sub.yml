name: Video Subtitle Extraction (High Accuracy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract-subs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget unzip p7zip-full curl ffmpeg

    - name: Install Python OCR Libraries
      run: |
        pip install paddlepaddle
        pip install paddleocr
        pip install videocr-thin  # Bản rút gọn dễ dùng hoặc dùng script custom
        # Hoặc dùng bản cải tiến:
        pip install git+https://github.com/apm1467/videocr.git 

    - name: Download video file
      run: |
        wget "https://vicdn.cc/tt/VTTD-VS-419.mp4" -O /tmp/video.mp4

    - name: Run OCR with Python Script
      shell: python
      run: |
        import os
        from videocr import save_subtitles_to_file
        
        # Cấu hình: lang='vi' cho tiếng Việt
        # Tesseract là mặc định, nhưng nếu bạn đã cài PaddleOCR 
        # bạn có thể dùng các script chuyên dụng hơn.
        # Ở đây ta dùng bản videocr có hỗ trợ tốt hơn cho tiếng Việt.
        
        try:
            save_subtitles_to_file('/tmp/video.mp4', lang='vie', conf_threshold=65, sim_threshold=90, output_file='/tmp/subtitles.srt')
            print("OCR Success")
        except Exception as e:
            print(f"Error: {e}")

    - name: Convert and Upload
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
        else
          echo "Subtitle file not generated."
          exit 1
        fi
