name: Video OCR Vietnamese - PaddleOCR Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget ffmpeg libtinfo6 libgl1 libglx-mesa0
        sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

    - name: Install Python and OCR Libraries
      run: |
        python -m pip install --upgrade pip
        # Cài đặt phiên bản ổn định
        pip install paddlepaddle paddleocr opencv-python-headless

    - name: Download Video
      run: |
        wget "https://vicdn.cc/tt/VTTD-VS-419.mp4" -O /tmp/video.mp4

    - name: Run OCR with PaddleOCR
      env:
        PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      shell: python
      run: |
        import os
        import cv2
        from paddleocr import PaddleOCR

        # PaddleOCR bản mới tự động nhận diện thiết bị (CPU/GPU)
        # Bỏ tham số use_gpu gây lỗi và cập nhật use_angle_cls
        try:
            ocr = PaddleOCR(
                use_textline_orientation=True, 
                lang='vi', 
                show_log=False
            )
        except Exception as e:
            print(f"Khởi tạo OCR lỗi, thử lại với tham số cơ bản: {e}")
            ocr = PaddleOCR(lang='vi', show_log=False)

        video_path = '/tmp/video.mp4'
        output_path = '/tmp/subtitles.srt'
        
        cap = cv2.VideoCapture(video_path)
        fps = cap.get(cv2.CAP_PROP_FPS)
        if fps <= 0: fps = 24
        
        width = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
        height = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))

        def format_time(seconds):
            hrs = int(seconds // 3600)
            mins = int((seconds % 3600) // 60)
            secs = int(seconds % 60)
            msecs = int((seconds - int(seconds)) * 1000)
            return f"{hrs:02}:{mins:02}:{secs:02},{msecs:03}"

        subs = []
        last_text = ""
        frame_interval = int(fps / 2) 
        
        print(f"Đang xử lý: {width}x{height} @ {fps} FPS")

        frame_count = 0
        while cap.isOpened():
            ret, frame = cap.read()
            if not ret: break
            
            if frame_count % frame_interval == 0:
                timestamp = frame_count / fps
                # Quét 25% vùng dưới cùng
                roi = frame[int(height * 0.75):height, 0:width]
                
                result = ocr.ocr(roi, cls=True)
                
                if result and result[0]:
                    current_text = " ".join([line[1][0] for line in result[0] if line[1][1] > 0.5]).strip()
                    
                    if current_text and current_text != last_text:
                        start_time = format_time(timestamp)
                        end_time = format_time(timestamp + 0.5)
                        # Đảm bảo dấu phẩy trong định dạng SRT
                        line = f"{len(subs) + 1}\n{start_time} --> {end_time}\n{current_text}\n"
                        subs.append(line)
                        last_text = current_text
                        print(f"[{start_time}] {current_text}")
            
            frame_count += 1

        cap.release()
        with open(output_path, 'w', encoding='utf-8') as f:
            f.write("\n".join(subs))
        
        print(f"Xong! Đã tìm thấy {len(subs)} dòng.")

    - name: Convert and Upload
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
        else
          echo "Không có file sub."
          exit 1
        fi
