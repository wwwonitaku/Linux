name: Video OCR Vietnamese - Fixed Path & OpenCV

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  videocr-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Prepare Workspace & Script
      run: |
        # Tạo file script ngay tại thư mục hiện tại để chắc chắn không mất file
        cat << 'EOF' > run_ocr.py
        import os, cv2, logging, sys
        import numpy as np
        from paddleocr import PaddleOCR

        logging.getLogger("ppocr").setLevel(logging.ERROR)
        print(f"Python: {sys.version}")
        print(f"NumPy version: {np.__version__}")

        try:
            ocr = PaddleOCR(lang='vi', use_angle_cls=False, use_gpu=False, show_log=False)
        except Exception as e:
            print(f"OCR Init Warning: {e}")
            ocr = PaddleOCR(lang='vi')

        video_path = '/tmp/video.mp4'
        cap = cv2.VideoCapture(video_path)
        fps = cap.get(cv2.CAP_PROP_FPS) or 25
        h = int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT))
        w = int(cap.get(cv2.CAP_PROP_FRAME_WIDTH))
        
        subs = []
        last_text = ""
        frame_count = 0
        
        while cap.isOpened():
            ret, frame = cap.read()
            if not ret: break
            if frame_count % int(fps/2) == 0:
                roi = frame[int(h*0.8):h, 0:w]
                result = ocr.ocr(roi, cls=False)
                if result and result[0]:
                    text = " ".join([l[1][0] for l in result[0] if l[1][1] > 0.5]).strip()
                    if text and text != last_text:
                        ts = frame_count/fps
                        t_str = f"{int(ts//3600):02}:{int((ts%3600)//60):02}:{int(ts%60):02},{int((ts%1)*1000):03}"
                        subs.append(f"{len(subs)+1}\n{t_str} --> {t_str}\n{text}\n")
                        last_text = text
                        print(f"[{t_str}] {text}")
            frame_count += 1
        cap.release()
        with open('/tmp/subtitles.srt', 'w', encoding='utf-8') as f:
            f.write("\n".join(subs))
        EOF

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget ffmpeg libtinfo6 libgl1
        sudo ln -s /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true

    - name: Final Environment Setup
      run: |
        python -m pip install --upgrade pip
        # 1. Ép bản NumPy cũ ngay lập tức
        pip install "numpy<2.0.0"
        # 2. Cài bản OpenCV cũ để nó KHÔNG đòi NumPy 2.0
        pip install "opencv-python-headless<4.10"
        # 3. Cài PaddleOCR và các phụ thuộc còn lại
        pip install paddlepaddle==2.6.2 paddleocr==2.7.3 httpx decorator pillow tqdm visualdl lmdb shapely pyclipper imgaug scikit-image layoutparser

    - name: Download Video
      run: |
        wget "https://vicdn.cc/tt/VTTD-VS-419.mp4" -O /tmp/video.mp4

    - name: Run OCR
      env:
        FLAGS_selected_gpus: ""
        PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      run: |
        python run_ocr.py

    - name: Upload Results
      if: always()
      run: |
        if [ -f "/tmp/subtitles.srt" ]; then
          ffmpeg -y -i /tmp/subtitles.srt /tmp/subtitles.vtt
          curl -X POST https://vicdn.cc/sub.php \
               -F "filename=VTTD-VS-419.vtt" \
               -F "file=@/tmp/subtitles.vtt"
          echo "Done!"
        else
          echo "Failed."
          exit 1
        fi
